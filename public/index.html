<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE Physics - AI Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, button { padding: 10px; font-size: 16px; margin: 10px 0; width: 100%; border-radius: 5px;}
        button { background: #0056b3; color: white; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { background: #004494; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .stimulus { background: #e3f2fd; padding: 15px; border-left: 4px solid #2196f3; margin-bottom: 15px; font-style: italic; }
        .options-list { list-style: none; padding: 0; }
        .options-list label { display: block; padding: 10px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 5px; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .options-list label:hover { background: #e2e6ea; }
        #feedbackBox { display: none; margin-top: 20px; padding: 15px; border-radius: 5px; font-weight: bold; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #loading { display: none; text-align: center; color: #0056b3; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #0056b3; text-align: center;">HKDSE Physics AI Generator</h1>
    <p style="text-align: center;">Select a topic to generate a unique, challenging reasoning question.</p>
    
    <select id="topicSelect">
        <option value="Heat and Gases">Heat and Gases</option>
        <option value="Wave and Optics">Wave and Optics</option>
        <option value="Mechanics">Mechanics & Advanced Mechanics</option>
        <option value="Electromagnetism">Electromagnetism</option>
    </select>

    <button id="generateBtn" onclick="generateQuestion()">Generate New Question</button>
    <p id="loading">Consulting the AI Physics Master... please wait...</p>

    <div id="questionContainer" style="display: none; margin-top: 20px; border-top: 2px solid #e9ecef; padding-top: 20px;">
        <div id="qStimulus" class="stimulus"></div>
        <p id="qText" style="font-weight: bold; font-size: 18px;"></p>
        <ul class="options-list" id="qOptions"></ul>
        <button id="submitBtn" onclick="checkAnswer()">Submit Answer</button>
        
        <div id="feedbackBox">
            <span id="feedbackStatus"></span>
            <div id="feedbackExplanation" style="margin-top: 10px; font-weight: normal;"></div>
        </div>
    </div>
</div>

<script>
    let currentQuestionData = null;

    async function generateQuestion() {
        const topic = document.getElementById('topicSelect').value;
        const btn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const container = document.getElementById('questionContainer');
        const feedback = document.getElementById('feedbackBox');

        // Reset UI
        btn.disabled = true;
        loading.style.display = 'block';
        container.style.display = 'none';
        feedback.style.display = 'none';
        document.getElementById('submitBtn').disabled = false;

        try {
            // Talk to our backend server
            const response = await fetch('/generate-mcq', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic: topic })
            });
            
            if (!response.ok) throw new Error("Server error");
            
            const data = await response.json();
            currentQuestionData = data; 

            // Populate the UI with AI data
            document.getElementById('qStimulus').innerHTML = data.stimulus;
            document.getElementById('qText').innerHTML = data.question;

            const optionsContainer = document.getElementById('qOptions');
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, index) => {
                optionsContainer.innerHTML += `<label><input type="radio" name="mcq" value="${index}"> ${opt}</label>`;
            });

            container.style.display = 'block';
        } catch (error) {
            console.error(error);
            alert("An error occurred. The AI might be busy or taking a break. Please try again.");
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    function checkAnswer() {
        const selected = document.querySelector('input[name="mcq"]:checked');
        if (!selected) return alert("Please select an answer!");

        document.getElementById('submitBtn').disabled = true;
        const feedbackBox = document.getElementById('feedbackBox');
        feedbackBox.style.display = 'block';

        if (parseInt(selected.value) === currentQuestionData.correct) {
            feedbackBox.className = 'correct';
            document.getElementById('feedbackStatus').innerText = "✅ Correct!";
        } else {
            feedbackBox.className = 'incorrect';
            document.getElementById('feedbackStatus').innerText = "❌ Incorrect.";
        }
        
        document.getElementById('feedbackExplanation').innerHTML = "<strong>Explanation:</strong><br>" + currentQuestionData.explanation; 
    }
</script>
</body>
</html>
